name: Update submodule pointer in main

on:
  push:
    branches:
      - content

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          submodules: recursive

      - name: Update content submodule to latest
        run: |
          git submodule update --init content/posts

          cd content/posts
          git fetch origin content:refs/remotes/origin/content
          cd ../..

          git submodule update --remote content/posts
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/posts
          git diff --staged --quiet || git commit -m "chore: update content submodule to latest"
          git push origin main
